<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>房屋健康体检系统</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f5;
  margin:0;
  padding:10px;
}

.card{
  background:#fff;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
}

h3{
  margin:10px 0;
  font-size:15px;
}

label{
  font-size:13px;
}

select{
  width:100%;
  padding:8px;
  margin:5px 0 10px 0;
}

button{
  width:100%;
  padding:12px;
  background:#07c160;
  color:#fff;
  border:none;
  border-radius:8px;
}

.result{
  font-size:18px;
  font-weight:bold;
  color:#07c160;
}
</style>
</head>

<body>

<div class="card"><h2>🏠 房屋健康体检系统</h2></div>

<!-- ① 饰面系统 -->
<div class="card">
<h3>① 饰面系统（15分）</h3>

<label>天面</label>
<select id="c1">
<option value="5">无问题</option>
<option value="3">轻微开裂</option>
<option value="3">返潮</option>
<option value="3">脱落</option>
<option value="4">其他</option>
</select>

<label>地面</label>
<select id="c2">
<option value="5">无问题</option>
<option value="3">起拱</option>
<option value="3">返潮</option>
<option value="3">划痕严重</option>
<option value="4">其他</option>
</select>

<label>墙面</label>
<select id="c3">
<option value="5">无问题</option>
<option value="3">发霉</option>
<option value="3">开裂</option>
<option value="3">脱落</option>
<option value="4">其他</option>
</select>
</div>

<!-- ② 门窗材料 -->
<div class="card">
<h3>② 门窗材料（20分）</h3>

<label>门</label>
<select id="d1">
<option value="5">无问题</option>
<option value="3">漏风</option>
<option value="3">变形</option>
<option value="3">隔音差</option>
</select>

<label>窗</label>
<select id="d2">
<option value="5">无问题</option>
<option value="3">漏风</option>
<option value="3">渗水</option>
<option value="3">隔音差</option>
</select>

<label>环保材料</label>
<select id="d3">
<option value="10">ENF级（最高）</option>
<option value="7">大部分环保</option>
<option value="4">部分环保</option>
<option value="1">不清楚</option>
</select>
</div>

<!-- ③ 通风系统 -->
<div class="card">
<h3>③ 通风系统（15分）</h3>

<label>客厅</label>
<select id="v1">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无窗</option>
</select>

<label>厨房</label>
<select id="v2">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无窗</option>
</select>

<label>卫生间</label>
<select id="v3">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无窗</option>
</select>

<label>主卧</label>
<select id="v4">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无窗</option>
</select>

<label>次卧</label>
<select id="v5">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无窗</option>
</select>
</div>

<!-- ④ 光照系统 -->
<div class="card">
<h3>④ 光照系统（15分）</h3>

<label>客厅</label>
<select id="l1">
<option value="5">优（南向/通透）</option>
<option value="3">良（东南/东）</option>
<option value="2">差（西向）</option>
<option value="0">北向/遮挡</option>
</select>

<label>厨房</label>
<select id="l2">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">北向</option>
</select>

<label>卫生间</label>
<select id="l3">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">无自然光</option>
</select>

<label>主卧</label>
<select id="l4">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">北向</option>
</select>

<label>次卧</label>
<select id="l5">
<option value="5">优</option>
<option value="3">良</option>
<option value="2">差</option>
<option value="0">北向</option>
</select>
</div>

<!-- ⑤ 痛点 -->
<div class="card">
<h3>⑤ 居住痛点（扣分）</h3>

<label><input type="checkbox" class="p" value="3">湿度问题</label><br>
<label><input type="checkbox" class="p" value="3">空气问题</label><br>
<label><input type="checkbox" class="p" value="3">噪音</label><br>
<label><input type="checkbox" class="p" value="3">灰尘</label><br>
<label><input type="checkbox" class="p" value="3">能耗高</label><br>
<label><input type="checkbox" class="p" value="3">其他</label>
</div>

<!-- ⑥ 加分 -->
<div class="card">
<h3>⑥ 加分系统</h3>

<label><input type="checkbox" class="b" value="3">新风系统</label><br>
<label><input type="checkbox" class="b" value="3">净水系统</label><br>
<label><input type="checkbox" class="b" value="3">门窗升级</label><br>
<label><input type="checkbox" class="b" value="3">智能家居</label>
</div>

<button onclick="calc()">生成体检报告</button>

<div class="card">
<div id="out"></div>
</div>

<script>

function sum(id){
return parseInt(document.getElementById(id).value);
}

function calc(){

// 饰面
let surface = sum("c1")+sum("c2")+sum("c3");

// 门窗
let door = sum("d1")+sum("d2")+sum("d3");

// 通风
let v = (sum("v1")+sum("v2")+sum("v3")+sum("v4")+sum("v5"))/25*15;

// 光照
let l = (sum("l1")+sum("l2")+sum("l3")+sum("l4")+sum("l5"))/25*15;

// 痛点
let pain = 0;
document.querySelectorAll(".p:checked").forEach(i=>pain+=+i.value);

// 加分
let bonus = 0;
document.querySelectorAll(".b:checked").forEach(i=>bonus+=+i.value);
if(bonus>10) bonus=10;

// 总分
let total = surface + door + v + l + 35 - pain + bonus;
if(total>100) total=100;

// 等级
let level="";
let advice="";

if(total>=90){
level="健康宜居";
advice="基础维护即可";
}else if(total>=75){
level="亚健康";
advice="建议升级新风/恒温系统";
}else{
level="需深度改造";
advice="建议整体被动式健康整装";
}

document.getElementById("out").innerHTML=
"评分："+total.toFixed(1)+"<br>"+
"等级："+level+"<br>"+
"建议："+advice;

}

</script>

</body>
</html>
