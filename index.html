<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>屋掌柜 HOME MASTER 房屋体检报告系统</title>
    <style>
        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", "Arial Rounded MT Bold", sans-serif;
            background: #50200A;
            display: flex;
            justify-content: center;
        }
        .wrapper {
            width: 85vw;
            max-width: 1100px;
            background: #f4f5f7;
            min-height: 100vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        .header {
            background: #50200A;
            color: #fff;
            text-align: center;
            padding: 22px 10px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }
        .header-line1 {
            font-size: 22px;
        }
        .header-line2 {
            font-size: 18px;
            font-weight: normal;
            margin-top: 4px;
        }
        .card {
            background: #fff;
            margin: 16px 12px;
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            border-left: 5px solid #07c160;
            padding-left: 10px;
        }
        .sub-title {
            font-weight: bold;
            margin: 10px 0 6px;
            color: #333;
        }
        label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0 4px 10px;
            font-size: 14px;
            cursor: pointer;
        }
        input[type="checkbox"],
        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #07c160;
        }
        select {
            width: 100%;
            padding: 10px;
            margin: 4px 0 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .inline-select {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 6px 10px;
            flex-wrap: wrap;
            font-size: 14px;
        }
        .inline-select span {
            min-width: 60px;
        }
        .inline-select select {
            flex: 1;
            min-width: 120px;
        }
        .info-row {
            margin-bottom: 14px;
        }
        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .field-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            display: block;
            width: 80%;
            margin: 12px auto;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #07c160;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #06ad56;
        }
        .other-input {
            display: none;
            margin-left: 30px;
            width: calc(100% - 40px);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        @media print {
            body {
                background: #fff;
            }
            .wrapper {
                width: 100%;
                box-shadow: none;
                border-radius: 0;
            }
            .card {
                box-shadow: none;
                margin: 8px 0;
                break-inside: avoid;
                page-break-inside: avoid;
            }
            button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="header-line1">🏠 屋掌柜 HOME MASTER</div>
            <div class="header-line2">房屋健康体检报告系统</div>
        </div>

        <!-- 客戶資訊卡片（新增） -->
        <div class="card">
            <div class="section-title">📋 客戶資訊</div>
            <div class="info-row">
                <div class="field-label">客戶姓名</div>
                <input type="text" id="custName" class="field-input" placeholder="請輸入客戶姓名">
            </div>
            <div class="info-row">
                <div class="field-label">手機號碼</div>
                <input type="tel" id="custPhone" class="field-input" placeholder="請輸入手機號碼">
            </div>
            <div class="info-row">
                <div class="field-label">房屋地址</div>
                <input type="text" id="custAddr" class="field-input" placeholder="請輸入房屋地址">
            </div>
        </div>

        <!-- 一、全屋饰面现状 -->
        <div class="card">
            <div class="section-title">① 全屋饰面现状</div>

            <div class="sub-title">天面饰面</div>
            <div id="surface-ceiling" class="issue-group">
                <label><input type="checkbox" class="no-problem" checked> 无问题</label>
                <label><input type="checkbox" class="issue" value="2"> 开裂</label>
                <label><input type="checkbox" class="issue" value="2"> 返潮</label>
                <label><input type="checkbox" class="issue" value="2"> 脱落</label>
                <label><input type="checkbox" class="issue other-option" value="1"> 其他（请注明）</label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>

            <div class="sub-title">地面饰面</div>
            <div id="surface-floor" class="issue-group">
                <label><input type="checkbox" class="no-problem" checked> 无问题</label>
                <label><input type="checkbox" class="issue" value="2"> 起拱</label>
                <label><input type="checkbox" class="issue" value="2"> 返潮</label>
                <label><input type="checkbox" class="issue" value="2"> 划痕严重</label>
                <label><input type="checkbox" class="issue other-option" value="1"> 其他（请注明）</label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>

            <div class="sub-title">墙面饰面</div>
            <div id="surface-wall" class="issue-group">
                <label><input type="checkbox" class="no-problem" checked> 无问题</label>
                <label><input type="checkbox" class="issue" value="2"> 发霉</label>
                <label><input type="checkbox" class="issue" value="2"> 开裂</label>
                <label><input type="checkbox" class="issue" value="2"> 脱落</label>
                <label><input type="checkbox" class="issue" value="2"> 涂画严重</label>
                <label><input type="checkbox" class="issue other-option" value="1"> 其他（请注明）</label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>
        </div>

        <!-- 二、门窗、材料现状 -->
        <div class="card">
            <div class="section-title">② 门窗、材料现状</div>

            <div class="sub-title">门与门框</div>
            <div id="door-group" class="issue-group">
                <label><input type="checkbox" class="no-problem" checked> 无问题</label>
                <label><input type="checkbox" class="issue" value="2"> 漏风</label>
                <label><input type="checkbox" class="issue" value="2"> 变形</label>
                <label><input type="checkbox" class="issue" value="2"> 隔音差</label>
                <label><input type="checkbox" class="issue other-option" value="1"> 其他（请注明）</label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>

            <div class="sub-title">窗与窗框</div>
            <div id="window-group" class="issue-group">
                <label><input type="checkbox" class="no-problem" checked> 无问题</label>
                <label><input type="checkbox" class="issue" value="2"> 漏风</label>
                <label><input type="checkbox" class="issue" value="2"> 渗水</label>
                <label><input type="checkbox" class="issue" value="2"> 隔音差</label>
                <label><input type="checkbox" class="issue other-option" value="1"> 其他（请注明）</label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>

            <div class="sub-title">环保材料使用</div>
            <select id="eco-material">
                <option value="10">全部ENF级环保材料</option>
                <option value="7">大部分为环保材料</option>
                <option value="4">仅主材为环保材料</option>
                <option value="1">少量环保材料</option>
                <option value="3">不清楚</option>
            </select>
        </div>

        <!-- 三、通风情况 -->
        <div class="card">
            <div class="section-title">③ 通风情况</div>
            <div class="inline-select"><span>客厅</span><select id="vent-living"><option value="5">优</option><option value="3">良</option><option value="2">差</option><option value="0">无窗、无排气</option></select></div>
            <div class="inline-select"><span>厨房</span><select id="vent-kitchen"><option value="5">优</option><option value="3">良</option><option value="2">差</option><option value="0">无窗、无排气</option></select></div>
            <div class="inline-select"><span>洗手间</span><select id="vent-bath"><option value="5">优</option><option value="3">良</option><option value="2">差</option><option value="0">无窗、无排气</option></select></div>
            <div class="inline-select"><span>主卧</span><select id="vent-main"><option value="5">优</option><option value="3">良</option><option value="2">差</option><option value="0">无窗、无排气</option></select></div>
            <div class="inline-select"><span>次卧</span><select id="vent-second"><option value="5">优</option><option value="3">良</option><option value="2">差</option><option value="0">无窗、无排气</option></select></div>
        </div>

        <!-- 四、光照情况 -->
        <div class="card">
            <div class="section-title">④ 光照情况</div>
            <div class="inline-select"><span>客厅</span><select id="light-living"><option value="5">优/南北对流/南向</option><option value="3">良/东向/东南向</option><option value="2">差/西向</option><option value="0">北向/有遮挡</option></select></div>
            <div class="inline-select"><span>厨房</span><select id="light-kitchen"><option value="5">优/南北对流/南向</option><option value="3">良/东向/东南向</option><option value="2">差/西向</option><option value="0">北向/有遮挡</option></select></div>
            <div class="inline-select"><span>洗手间</span><select id="light-bath"><option value="5">优/南北对流/南向</option><option value="3">良/东向/东南向</option><option value="2">差/西向</option><option value="0">北向/有遮挡</option></select></div>
            <div class="inline-select"><span>主卧</span><select id="light-main"><option value="5">优/南北对流/南向</option><option value="3">良/东向/东南向</option><option value="2">差/西向</option><option value="0">北向/有遮挡</option></select></div>
            <div class="inline-select"><span>次卧</span><select id="light-second"><option value="5">优/南北对流/南向</option><option value="3">良/东向/东南向</option><option value="2">差/西向</option><option value="0">北向/有遮挡</option></select></div>
        </div>

        <!-- 五、居住习惯与痛点 -->
        <div class="card">
            <div class="section-title">⑤ 居住习惯与痛点 <span style="font-weight:normal; font-size:13px;">（勾选即扣分）</span></div>
            <div id="pain-points">
                <label><input type="checkbox" class="pain" value="3"> 回南天潮湿</label>
                <label><input type="checkbox" class="pain" value="3"> 暴晒</label>
                <label><input type="checkbox" class="pain" value="3"> 墙体龟裂/漏水/发霉</label>
                <label><input type="checkbox" class="pain" value="3"> 空气浑浊/异味重</label>
                <label><input type="checkbox" class="pain" value="3"> 通风不足</label>
                <label><input type="checkbox" class="pain" value="3"> 噪音干扰大</label>
                <label><input type="checkbox" class="pain" value="3"> 水质差</label>
                <label><input type="checkbox" class="pain" value="3"> 光线、照明不足、氛围感差</label>
                <label><input type="checkbox" class="pain" value="3"> 能耗高、费用高</label>
                <label><input type="checkbox" class="pain" value="3"> 网络速度慢</label>
                <label><input type="checkbox" class="pain" value="3"> 储物空间少</label>
                <label><input type="checkbox" class="pain" value="3"> 厨卫反味、地漏异味</label>
                <label><input type="checkbox" class="pain" value="3"> 灰尘多</label>
                <label><input type="checkbox" class="pain" value="3"> 蚊虫多</label>
                <label>
                    <input type="checkbox" class="pain other-option" value="3"> 其他（请注明）
                </label>
                <input type="text" class="other-input" placeholder="请输入其他痛点">
            </div>
        </div>

        <!-- 六、额外加分项 -->
        <div class="card">
            <div class="section-title">⑥ 额外加分项 <span style="font-weight:normal; font-size:13px;">（最多加至10分）</span></div>
            <div id="bonus-points">
                <label><input type="checkbox" class="bonus" value="3"> 已有全屋新风系统</label>
                <label><input type="checkbox" class="bonus" value="3"> 已有净水系统</label>
                <label><input type="checkbox" class="bonus" value="3"> 已有隔音/保温门窗</label>
                <label><input type="checkbox" class="bonus" value="3"> 已有智能家居设备</label>
                <label>
                    <input type="checkbox" class="bonus other-option" value="1"> 其他（请注明）
                </label>
                <input type="text" class="other-input" placeholder="请注明">
            </div>
        </div>

        <button onclick="generateReport()">📋 生成体检报告</button>

        <div class="card report" id="report" style="display:none;"></div>
    </div>

    <script>
        // 初始化问题组互斥逻辑
        function initIssueGroups() {
            document.querySelectorAll('.issue-group').forEach(group => {
                const noProb = group.querySelector('.no-problem');
                const issues = group.querySelectorAll('.issue');
                if (noProb) noProb.checked = true;
                if (noProb) {
                    noProb.addEventListener('change', function() {
                        if (this.checked) issues.forEach(iss => iss.checked = false);
                    });
                }
                issues.forEach(iss => {
                    iss.addEventListener('change', function() {
                        if (this.checked && noProb) noProb.checked = false;
                        if (!Array.from(issues).some(i => i.checked) && noProb) noProb.checked = true;
                    });
                });
            });
        }

        // 初始化“其他”选项的输入框显示
        function initOtherInputs() {
            document.querySelectorAll('.other-option').forEach(cb => {
                const input = cb.closest('label') ? cb.closest('label').nextElementSibling : cb.parentElement.nextElementSibling;
                if (input && input.classList.contains('other-input')) {
                    cb.addEventListener('change', function() {
                        input.style.display = this.checked ? 'block' : 'none';
                        if (!this.checked) input.value = '';
                    });
                }
            });
        }

        // 计算扣分制得分（5分基准）
        function calcGroupScore(groupId) {
            const group = document.getElementById(groupId);
            if (!group) return 0;
            const noProb = group.querySelector('.no-problem');
            if (noProb && noProb.checked) return 5;
            let deduction = 0;
            group.querySelectorAll('.issue:checked').forEach(cb => deduction += parseInt(cb.value) || 0);
            return Math.max(0, 5 - deduction);
        }

        // 为得分添加红色样式
        function styleScore(score) {
            return score < 0 ? ' style="color:red; font-weight:bold;"' : '';
        }

        // 获取扣分制各分项及总分的函数（用于登记）
        function getHealthScores() {
            const ceiling = calcGroupScore('surface-ceiling');
            const floor = calcGroupScore('surface-floor');
            const wall = calcGroupScore('surface-wall');
            const surfaceTotal = ceiling + floor + wall;

            const doorScore = calcGroupScore('door-group');
            const windowScore = calcGroupScore('window-group');
            const eco = parseInt(document.getElementById('eco-material').value);
            const doorWinTotal = doorScore + windowScore + eco;

            const ventLiving = parseInt(document.getElementById('vent-living').value);
            const ventKitchen = parseInt(document.getElementById('vent-kitchen').value);
            const ventBath = parseInt(document.getElementById('vent-bath').value);
            const ventMain = parseInt(document.getElementById('vent-main').value);
            const ventSecond = parseInt(document.getElementById('vent-second').value);
            const ventRawSum = ventLiving + ventKitchen + ventBath + ventMain + ventSecond;
            const ventTotal = (ventRawSum / 25) * 15;

            const lightLiving = parseInt(document.getElementById('light-living').value);
            const lightKitchen = parseInt(document.getElementById('light-kitchen').value);
            const lightBath = parseInt(document.getElementById('light-bath').value);
            const lightMain = parseInt(document.getElementById('light-main').value);
            const lightSecond = parseInt(document.getElementById('light-second').value);
            const lightRawSum = lightLiving + lightKitchen + lightBath + lightMain + lightSecond;
            const lightTotal = (lightRawSum / 25) * 15;

            let painDeduction = 0;
            document.querySelectorAll('.pain:checked').forEach(cb => painDeduction += parseInt(cb.value));
            const painTotal = Math.max(0, 35 - painDeduction);

            let bonus = 0;
            document.querySelectorAll('.bonus:checked').forEach(cb => bonus += parseInt(cb.value));
            bonus = Math.min(bonus, 10);

            let total = surfaceTotal + doorWinTotal + ventTotal + lightTotal + painTotal + bonus;
            total = Math.min(total, 110);
            total = Math.round(total * 10) / 10;

            let levelText = '';
            if (total >= 90) levelText = '健康宜居';
            else if (total >= 75) levelText = '亚健康';
            else levelText = '需深度改造';

            return { total, levelText, surfaceTotal, doorWinTotal, ventTotal, lightTotal, painTotal, bonus };
        }

        // 生成报告新窗口（保留原有功能，内部调用 getHealthScores 避免重复代码）
        function generateReport() {
            const scores = getHealthScores();
            const total = scores.total;
            const ceiling = calcGroupScore('surface-ceiling');
            const floor = calcGroupScore('surface-floor');
            const wall = calcGroupScore('surface-wall');
            const doorScore = calcGroupScore('door-group');
            const windowScore = calcGroupScore('window-group');
            const eco = parseInt(document.getElementById('eco-material').value);
            const ventLiving = parseInt(document.getElementById('vent-living').value);
            const ventKitchen = parseInt(document.getElementById('vent-kitchen').value);
            const ventBath = parseInt(document.getElementById('vent-bath').value);
            const ventMain = parseInt(document.getElementById('vent-main').value);
            const ventSecond = parseInt(document.getElementById('vent-second').value);
            const ventRawSum = ventLiving + ventKitchen + ventBath + ventMain + ventSecond;
            const ventTotal = (ventRawSum / 25) * 15;
            const lightLiving = parseInt(document.getElementById('light-living').value);
            const lightKitchen = parseInt(document.getElementById('light-kitchen').value);
            const lightBath = parseInt(document.getElementById('light-bath').value);
            const lightMain = parseInt(document.getElementById('light-main').value);
            const lightSecond = parseInt(document.getElementById('light-second').value);
            const lightRawSum = lightLiving + lightKitchen + lightBath + lightMain + lightSecond;
            const lightTotal = (lightRawSum / 25) * 15;
            let painDeduction = 0;
            document.querySelectorAll('.pain:checked').forEach(cb => painDeduction += parseInt(cb.value));
            const painTotal = Math.max(0, 35 - painDeduction);
            let bonus = 0;
            document.querySelectorAll('.bonus:checked').forEach(cb => bonus += parseInt(cb.value));
            bonus = Math.min(bonus, 10);

            let levelText = '';
            let advice = '';
            if (total >= 90) {
                levelText = '✅ 健康宜居';
                advice = '仅需基础维护，居住体验良好。';
            } else if (total >= 75) {
                levelText = '⚠️ 亚健康';
                advice = '建议进行环境系统升级（新风/恒温恒湿）。';
            } else {
                levelText = '❌ 需深度改造';
                advice = '强烈建议进行自然环境整装，打造宜居壳体。';
            }

            const reportHTML = `<!DOCTYPE html>
            <html lang="zh">
            <head>
                <meta charset="UTF-8">
                <title>房屋健康体检报告</title>
                <style>
                    * { box-sizing: border-box; }
                    body {
                        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
                        margin: 0;
                        padding: 40px;
                        background: #f4f5f7;
                        display: flex;
                        justify-content: center;
                        align-items: flex-start;
                        min-height: 100vh;
                    }
                    .report-wrapper {
                        width: 100%;
                        max-width: 800px;
                        background: white;
                        padding: 40px;
                        border-radius: 16px;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                    }
                    h2 {
                        text-align: center;
                        margin-top: 0;
                        font-size: 24px;
                        line-height: 1.6;
                    }
                    h2 .main-title {
                        font-size: 24px;
                        font-weight: bold;
                    }
                    h2 .sub-title {
                        font-size: 20px;
                        font-weight: normal;
                        display: block;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin: 25px 0;
                    }
                    th, td {
                        border: 1px solid #ddd;
                        padding: 10px 12px;
                        text-align: left;
                    }
                    th {
                        background: #f9f9f9;
                        font-weight: bold;
                    }
                    .score-negative {
                        color: red;
                        font-weight: bold;
                    }
                    .level-healthy { color: #07c160; font-weight: bold; }
                    .level-warning { color: #f0ad4e; font-weight: bold; }
                    .level-danger { color: #d9534f; font-weight: bold; }
                    .advice-text { font-weight: bold; }
                    .btn-print {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 8px;
                        margin: 30px auto 10px;
                        padding: 12px 30px;
                        background: #07c160;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        font-size: 16px;
                        cursor: pointer;
                        width: fit-content;
                    }
                    .btn-print:hover { background: #06ad56; }
                    .btn-print svg {
                        width: 20px;
                        height: 20px;
                        fill: currentColor;
                    }
                    .btn-return {
                        position: fixed;
                        bottom: 20px;
                        right: 20px;
                        padding: 10px 20px;
                        background: #07c160;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        font-size: 14px;
                        cursor: pointer;
                        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                        z-index: 1000;
                    }

    <!-- ========== 客户登记/更新模块 (适配房屋健康系统，自动填充) ========== -->
    <style>
        #openFormBtnFix {
            all: initial !important;
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            z-index: 9999 !important;
            background-color: #007bff !important;
            color: white !important;
            border: none !important;
            border-radius: 50px !important;
            padding: 12px 20px !important;
            cursor: pointer !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3) !important;
            font-weight: bold !important;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif !important;
            font-size: 16px !important;
            line-height: 1 !important;
            width: auto !important;
            height: auto !important;
            letter-spacing: normal !important;
            text-transform: none !important;
        }
    </style>

    <button id="openFormBtnFix">📋 登记/更新客户</button>

    <div id="recordModalFix" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: white; width: 90%; max-width: 500px; max-height: 80%; overflow-y: auto; border-radius: 10px; padding: 20px; color: #333;">
            <h3>客户信息登记/更新</h3>
            <form id="recordFormFix">
                <label>员工姓名：</label><input type="text" id="employee_name_fix" required><br><br>
                <label>客户姓名：</label><input type="text" id="customer_name_fix" required><br><br>
                <label>📱 客户手机号（唯一标识）：</label><input type="tel" id="customer_phone_fix" required><br><br>
                <label>房屋地址：</label><textarea id="address_fix" rows="2" required></textarea><br><br>
                
                <label>使用的系统：</label>
                <select id="system_used_fix">
                    <option value="房屋健康系统" selected>房屋健康系统</option>
                    <option value="定价系统">定价系统</option>
                    <option value="产品系统">产品系统</option>
                    <option value="Home-Master">Home-Master</option>
                </select><br><br>
                
                <div id="dynamicFieldsFix"></div>
                
                <label>客户意向等级：</label>
                <select id="intent_level_fix">
                    <option value="">-- 不更新 --</option>
                    <option value="高">高</option>
                    <option value="中">中</option>
                    <option value="低">低</option>
                    <option value="已签约">已签约</option>
                </select><br><br>
                
                <label>跟进备注：</label><textarea id="remark_fix" rows="2"></textarea><br><br>
                
                <label>跟进状态：</label>
                <select id="followup_status_fix">
                    <option value="">-- 不更新 --</option>
                    <option value="待跟进">待跟进</option>
                    <option value="已报价">已报价</option>
                    <option value="已签约">已签约</option>
                    <option value="已放弃">已放弃</option>
                </select><br><br>
                
                <button type="submit">提交</button>
                <button type="button" id="closeModalBtnFix">取消</button>
            </form>
        </div>
    </div>

    <script>
    (function() {
        const modal = document.getElementById('recordModalFix');
        const openBtn = document.getElementById('openFormBtnFix');
        const closeBtn = document.getElementById('closeModalBtnFix');
        const form = document.getElementById('recordFormFix');
        const systemSelect = document.getElementById('system_used_fix');
        const dynamicFieldsDiv = document.getElementById('dynamicFieldsFix');

        if (!openBtn || !modal) return;

        // 自动填充函数（每次打开弹窗时调用）
        function autoFillForm() {
            // 1. 客户基础信息（从页面新加的输入框获取）
            const custName = document.getElementById('custName')?.value || '';
            const custPhone = document.getElementById('custPhone')?.value || '';
            const custAddr = document.getElementById('custAddr')?.value || '';
            document.getElementById('customer_name_fix').value = custName;
            document.getElementById('customer_phone_fix').value = custPhone;
            document.getElementById('address_fix').value = custAddr;

            // 2. 房屋健康评分&等级 & 关键指标
            const scores = typeof getHealthScores === 'function' ? getHealthScores() : { total:0, levelText:'未知' };
            const totalScore = scores.total;
            const levelText = scores.levelText;
            // 关键指标：可汇总主要问题或总分+等级
            let indicators = `总分:${totalScore}分，${levelText}`;
            // 可额外加入一些重点扣分项摘要
            if (scores.surfaceTotal < 12) indicators += `；饰面扣分较多`;
            if (scores.doorWinTotal < 15) indicators += `；门窗/材料较差`;
            if (scores.painTotal < 25) indicators += `；居住痛点较多`;
            // 填充到房屋健康系统专用字段
            const scoreField = document.getElementById('house_health_score_fix');
            const indicatorField = document.getElementById('health_indicators_fix');
            if (scoreField) scoreField.value = `${totalScore}分 (${levelText})`;
            if (indicatorField) indicatorField.value = indicators;
        }

        openBtn.onclick = () => {
            autoFillForm();   // 打开弹窗前自动填充
            modal.style.display = 'flex';
        };
        closeBtn.onclick = () => { modal.style.display = 'none'; };
        window.onclick = (event) => { if (event.target === modal) modal.style.display = 'none'; };

        function updateDynamicFields() {
            const system = systemSelect.value;
            let html = '';
            if (system === '房屋健康系统') {
                html = `
                    <label>房屋健康评分/等级：</label><input type="text" id="house_health_score_fix"><br><br>
                    <label>健康检测关键指标：</label><textarea id="health_indicators_fix" rows="2"></textarea><br><br>
                `;
            } else if (system === '定价系统') {
                html = `
                    <label>报价方案编号/名称：</label><input type="text" id="quotation_name_fix"><br><br>
                    <label>报价总金额（元）：</label><input type="number" id="quotation_amount_fix"><br><br>
                `;
            } else if (system === '产品系统') {
                html = `
                    <label>所选产品清单：</label><textarea id="product_list_fix" rows="2"></textarea><br><br>
                    <label>产品总金额（元）：</label><input type="number" id="product_amount_fix"><br><br>
                `;
            } else if (system === 'Home-Master') {
                html = `
                    <label>Home-Master 汇总结论：</label><textarea id="home_master_summary_fix" rows="2"></textarea><br><br>
                `;
            }
            dynamicFieldsDiv.innerHTML = html;
        }
        systemSelect.addEventListener('change', updateDynamicFields);
        updateDynamicFields();

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const getVal = (id) => document.getElementById(id)?.value || '';
            const payload = {
                employee_name: getVal('employee_name_fix'),
                customer_name: getVal('customer_name_fix'),
                customer_phone: getVal('customer_phone_fix'),
                address: getVal('address_fix'),
                system_used: systemSelect.value,
                house_health_score: getVal('house_health_score_fix'),
                health_indicators: getVal('health_indicators_fix'),
                quotation_name: getVal('quotation_name_fix'),
                quotation_amount: getVal('quotation_amount_fix'),
                product_list: getVal('product_list_fix'),
                product_amount: getVal('product_amount_fix'),
                home_master_summary: getVal('home_master_summary_fix'),
                intent_level: getVal('intent_level_fix'),
                remark: getVal('remark_fix'),
                followup_status: getVal('followup_status_fix')
            };
            
            if (!payload.customer_phone) {
                alert('请填写客户手机号');
                return;
            }
            
            // 请确保这个 URL 是你正确的 Google Apps Script 地址
            const webAppUrl = 'https://script.google.com/macros/s/AKfycbwyRgdHugsLqcBDNXjaQvQKAdDq2wugPTUuTav1_75Crb2jJK-NGg6aHcOTGFUKFRwo/exec';
            
            try {
                const response = await fetch(webAppUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(payload)
                });
                const result = await response.json();
                if (result.result === 'new') {
                    alert('新客户登记成功！');
                } else if (result.result === 'updated') {
                    alert('客户信息已更新！');
                } else {
                    alert('操作失败：' + JSON.stringify(result));
                }
                modal.style.display = 'none';
                form.reset();
            } catch (err) {
                alert('网络错误：' + err.message);
            }
        };
    })();
    </script>
    <!-- ========== 登记模块结束 ========== -->

</body>
